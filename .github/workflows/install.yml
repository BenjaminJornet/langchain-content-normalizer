name: Install from PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install published package
        run: python -m pip install langchain-content-normalizer
      - name: Import and smoke published package
        run: |
          python - <<'PY'
          from lc_content_normalizer import extract_text_content, build_human_message_content
          assert extract_text_content([{"type": "text", "text": "ok"}]) == "ok"
          assert build_human_message_content("hi", [], "none") == "hi"
          print("published package import ok")
          PY
